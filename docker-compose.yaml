services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: payments
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d payments"]
      interval: 3s
      timeout: 3s
      retries: 20

  payments:
    build:
      context: ./sources/api/payments
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/payments
      TZ: UTC
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
